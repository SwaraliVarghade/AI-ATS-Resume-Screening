<!DOCTYPE html>
<html>
<head>
    <title>Upload Resume</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #0a192f);
            font-family: 'Segoe UI', sans-serif;
            color: #e6f1ff;
        }

        h2 {
            color: #20c997;
            font-weight: 600;
        }

        /* Glass Card */
        .card-dark {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 18px;
            padding: 35px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        /* Inputs */
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 12px;
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #20c997;
            box-shadow: 0 0 10px rgba(32, 201, 151, 0.5);
            color: #fff;
        }

        /* File Upload */
        .file-upload {
            padding: 20px;
            border: 2px dashed #20c997;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .file-upload:hover {
            background: rgba(32, 201, 151, 0.1);
        }

        .file-upload input {
            background: transparent;
            border: none;
        }

        /* Button */
        .btn-teal {
            background: #20c997;
            border: none;
            color: black;
            font-weight: 600;
            border-radius: 30px;
            padding: 10px 25px;
            transition: 0.3s;
        }

        .btn-teal:hover {
            background: #17b08a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(32, 201, 151, 0.4);
        }

        .page-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

    </style>
</head>

<body>

<div class="page-wrapper">
    <div class="container">

        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card-dark">

                    <h2 class="text-center mb-4">Upload Resume</h2>

                    <form method="POST" enctype="multipart/form-data">

                        <div class="mb-4">
                            <label class="form-label">Candidate Name</label>
                            <input type="text" 
                                   name="candidate_name" 
                                   class="form-control"
                                   placeholder="Enter candidate name"
                                   required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Upload PDF Resume</label>

                            <div class="file-upload">
                                <input type="file" 
                                       name="resume" 
                                       class="form-control"
                                       accept=".pdf"
                                       required>
                                <small class="d-block mt-2 text-muted">
                                    Only PDF files allowed
                                </small>
                            </div>
                        </div>

                        <div class="text-center">
                            <button class="btn btn-teal">
                                Upload & Analyze
                            </button>
                        </div>

                    </form>

                </div>

            </div>
        </div>

    </div>
</div>

</body>
</html>
