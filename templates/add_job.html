<!DOCTYPE html>
<html>
<head>
    <title>Add Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #0a192f);
            color: #e6f1ff;
            min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            background: transparent;
            border-bottom: 1px solid rgba(32, 201, 151, 0.3);
            font-size: 20px;
            font-weight: 600;
            color: #20c997;
        }

        .form-control {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(32, 201, 151, 0.3);
            color: #ffffff;
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .form-control:focus {
            background: rgba(255,255,255,0.1);
            border-color: #20c997;
            box-shadow: 0 0 10px rgba(32, 201, 151, 0.4);
            color: #fff;
        }

        .btn-primary {
            background-color: #20c997;
            border: none;
            font-weight: 500;
            padding: 8px 20px;
        }

        .btn-primary:hover {
            background-color: #17b38a;
        }

        .page-title {
            font-size: 28px;
            font-weight: 600;
            color: #20c997;
            margin-bottom: 25px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="text-center page-title">
        Add New Job Position
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">

                <form method="POST">
                    <input type="text" name="title" class="form-control mb-3" placeholder="Enter Job Title" required>

                    <textarea name="description" class="form-control mb-3" rows="6" placeholder="Enter Job Description" required></textarea>

                    <div class="text-end">
                        <button class="btn btn-primary">
                            + Add Job
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

</div>

</body>
</html>
